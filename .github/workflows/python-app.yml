# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Build Dockerized Flask App

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Docker Buildx (required for Docker build)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      # 3. Build the Docker image
      - name: Build Docker image
        run: docker build . --file Dockerfile --tag my-flask-app:latest

      # 4. Run Docker Compose
      - name: Run Docker Compose
        run: docker compose up -d

      # 5. Wait a few seconds for container to start
      - name: Wait for container
        run: sleep 5

      # 6. Verify Docker container is running
      - name: Check running containers
        run: docker ps
